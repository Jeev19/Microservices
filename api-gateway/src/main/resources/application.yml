server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/orders/**
        - id: inventory-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/inventory/**
        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/payments/**
        - id: order-service-docs
          uri: http://localhost:8081
          predicates:
            - Path=/order-service/**
          filters:
            - RewritePath=/order-service/(?<segment>.*), /$\{segment}
        - id: inventory-service-docs
          uri: http://localhost:8082
          predicates:
            - Path=/inventory-service/**
          filters:
            - RewritePath=/inventory-service/(?<segment>.*), /$\{segment}
        - id: payment-service-docs
          uri: http://localhost:8083
          predicates:
            - Path=/payment-service/**
          filters:
            - RewritePath=/payment-service/(?<segment>.*), /$\{segment}

springdoc:
  swagger-ui:
    urls:
      - name: Order Service
        url: /order-service/v3/api-docs
      - name: Inventory Service
        url: /inventory-service/v3/api-docs
      - name: Payment Service
        url: /payment-service/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,gateway

logging:
  level:
    com.example.gateway: INFO
    org.springframework.cloud.gateway: INFO
